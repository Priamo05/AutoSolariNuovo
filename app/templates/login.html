{% extends 'base.html' %}
{% block content %}
<h1>Login</h1>
<form method="post" class="card card-body">
  {{ form.hidden_tag() }}
  <div class="mb-3">{{ form.email.label }} {{ form.email(class='form-control') }}</div>
  <div class="mb-3">{{ form.password.label }} {{ form.password(class='form-control') }}</div>
  {{ form.submit(class='btn btn-primary') }}
  <a href="{{ url_for('auth.register') }}" class="mt-3">Non hai un account? Registrati</a>
</form>
{% endblock %}
