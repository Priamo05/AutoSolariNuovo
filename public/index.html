<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Auto Solari CF</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head><body class="bg-light"><div class="container py-4"><h1 class="h3">Auto Solari (Cloudflare)</h1><p class="text-muted">Frontend statico + API Workers</p><div id="auth" class="card p-3 mb-3"><div class="row g-2"><div class="col"><input id="name" class="form-control" placeholder="Nome"></div><div class="col"><input id="email" class="form-control" placeholder="Email"></div><div class="col"><input id="pwd" type="password" class="form-control" placeholder="Password"></div></div><div class="mt-2 d-flex gap-2"><button class="btn btn-primary" onclick="register()">Registrati</button><button class="btn btn-success" onclick="login()">Login</button><button class="btn btn-outline-danger" onclick="logout()">Logout</button></div></div><div id="app" style="display:none"><button class="btn btn-sm btn-secondary mb-3" onclick="loadAll()">Ricarica dashboard</button><pre id="out" class="bg-white border rounded p-3"></pre></div></div><script src="/app.js"></script></body></html>
